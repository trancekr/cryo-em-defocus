<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryo-EM: Understanding Defocus in TEM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #f5f5f8;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #1a1a2e; min-height: 100vh;
    display: flex; justify-content: center; padding: 8px;
}
#app { max-width: 1500px; width: 100%; }

.header { text-align: center; margin-bottom: 8px; }
.header h1 {
    font-size: 26px; font-weight: 700; color: #1a1a2e;
}
.header p { font-size: 13px; color: #666; margin-top: 2px; }

.card {
    background: #fff;
    border: 1px solid #e0e0e8;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: #888; padding: 8px 12px 4px;
}

/* === Main 2-column layout === */
.main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 10px; margin-bottom: 6px;
}

/* Left: Ray Diagram */
.col-ray { grid-column: 1; }
.ray-wrap canvas {
    display: block; width: 100%; aspect-ratio: 4 / 3;
}

/* Right: Side panel */
.col-side {
    grid-column: 2;
    display: flex; flex-direction: column; gap: 8px;
}

/* Object + Image row */
.sim-row { display: flex; gap: 8px; }
.sim-cell { flex: 1; }
.sim-cell canvas { display: block; width: 100%; aspect-ratio: 1; }
#defocus-badge {
    text-align: center; padding: 4px;
    font-size: 13px; font-weight: 600; color: #5b21b6;
    border-top: 1px solid #eee;
    font-variant-numeric: tabular-nums;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Info panel */
.info-card { padding: 14px; display: flex; flex-direction: column; flex: 1; }
.info-stage {
    display: inline-block; padding: 3px 12px; border-radius: 12px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    margin-bottom: 8px; width: fit-content;
}
.stage-focus { background: #d1fae5; color: #065f46; }
.stage-under { background: #dbeafe; color: #1e40af; }
.stage-over { background: #ffedd5; color: #9a3412; }
.info-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; line-height: 1.3; }
.info-observe { font-size: 13px; color: #555; margin-bottom: 8px; line-height: 1.5; }
.info-observe span { color: #1a1a2e; font-weight: 500; }
.info-physics {
    font-size: 12px; color: #777; line-height: 1.5;
    border-top: 1px solid #eee; padding-top: 8px; margin-top: auto;
}
.info-physics b { color: #5b21b6; font-weight: 600; }
.info-stat { display: flex; gap: 6px; margin-top: 8px; }
.info-stat div {
    flex: 1; background: #f8f8fc;
    border: 1px solid #e8e8f0;
    border-radius: 8px; padding: 6px; text-align: center;
}
.info-stat .val { font-size: 17px; font-weight: 700; color: #5b21b6; }
.info-stat .lbl { font-size: 9px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* CTF */
.ctf-section canvas { display: block; width: 100%; height: 65px; }
.ctf-section .axis { text-align: center; font-size: 10px; color: #999; padding: 2px 0 4px; }

/* Legend */
.legend-row {
    display: flex; gap: 14px; justify-content: center; align-items: center;
    padding: 4px 0;
}
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #555; font-weight: 500; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

/* === Controls === */
.controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 14px; background: #fff;
}
.play-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: #5b21b6; color: #fff; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; box-shadow: 0 2px 8px rgba(91,33,182,0.25);
}
.play-btn:hover { transform: scale(1.08); }
.slider-wrap { flex: 1; min-width: 140px; }
.slider-labels {
    display: flex; justify-content: space-between; font-size: 11px; color: #888;
    margin-bottom: 2px;
}
input[type=range] {
    -webkit-appearance: none; width: 100%; height: 5px;
    background: linear-gradient(to right, #fecaca 0%, #fef2f2 12%, #d1fae5 13.5%, #d1fae5 15.5%, #dbeafe 17%, #bfdbfe 100%);
    border-radius: 3px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: #5b21b6; cursor: pointer;
    box-shadow: 0 0 4px rgba(91,33,182,0.3);
}
.slider-val {
    font-size: 15px; font-weight: 700; color: #5b21b6;
    min-width: 90px; text-align: right; font-variant-numeric: tabular-nums;
}
.presets { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
    padding: 5px 12px; border-radius: 14px;
    border: 1px solid #d0d0d8;
    background: #f8f8fc; color: #555; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
}
.pill:hover { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
.pill.active { background: #5b21b6; color: #fff; border-color: #5b21b6; }
.pill-over:hover { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
.pill-over.active { background: #c2410c; color: #fff; border-color: #c2410c; }
</style>
</head>
<body>
<div id="app">
    <div class="header">
        <h1>Cryo-EM: Understanding Defocus in TEM</h1>
        <p>How objective lens defocus creates phase contrast · 300 kV · Cs = 2.7 mm</p>
    </div>

    <div class="main-grid">
        <div class="col-ray">
            <div class="card ray-wrap">
                <canvas id="rayCanvas" width="1200" height="900"></canvas>
            </div>
        </div>

        <div class="col-side">
            <div class="sim-row">
                <div class="sim-cell">
                    <div class="card">
                        <div class="card-label">Object</div>
                        <canvas id="objCanvas" width="256" height="256"></canvas>
                    </div>
                </div>
                <div class="sim-cell">
                    <div class="card">
                        <div class="card-label">Image</div>
                        <canvas id="imgCanvas" width="256" height="256"></canvas>
                        <div id="defocus-badge">defocus: 0.000 μm</div>
                    </div>
                </div>
            </div>

            <div class="card info-card" id="info-card"></div>

            <div class="card ctf-section">
                <div class="card-label">Contrast Transfer Function</div>
                <canvas id="ctfCanvas" width="900" height="70"></canvas>
                <div class="axis">Spatial frequency (Å⁻¹)</div>
            </div>

            <div class="legend-row">
                <div class="legend-item"><div class="legend-dot" style="background:#059669;"></div>In Focus</div>
                <div class="legend-item"><div class="legend-dot" style="background:#2563eb;"></div>Underfocus</div>
                <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div>Overfocus</div>
            </div>
        </div>
    </div>

    <div class="card controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <div class="slider-wrap">
            <div class="slider-labels"><span style="color:#dc2626;font-weight:600">◀ Overfocus</span><span style="color:#059669;font-weight:600">In Focus</span><span style="color:#2563eb;font-weight:600">Underfocus ▶</span></div>
            <input type="range" id="defocus-slider" min="-500" max="3000" step="1" value="0" oninput="onSlider()">
        </div>
        <span class="slider-val" id="slider-label">0.000 μm</span>
        <div class="presets">
            <button class="pill pill-over" onclick="setDefocus(-300)">-0.3 μm</button>
            <button class="pill active" onclick="setDefocus(0)">In focus</button>
            <button class="pill" onclick="setDefocus(88)">Scherzer</button>
            <button class="pill" onclick="setDefocus(500)">0.5 μm</button>
            <button class="pill" onclick="setDefocus(1000)">1.0 μm</button>
        </div>
    </div>
</div>

<script>
// ====== PHYSICS ENGINE ======
const N=256,pixelSize=1.0,lambda=0.01969,Cs=2.7e7,Bfactor=60,displayGain=500;

function fft1d(re,im,inv){const n=re.length;for(let i=1,j=0;i<n;i++){let b=n>>1;for(;j&b;b>>=1)j^=b;j^=b;if(i<j){let t=re[i];re[i]=re[j];re[j]=t;t=im[i];im[i]=im[j];im[j]=t;}}for(let len=2;len<=n;len<<=1){const a=2*Math.PI/len*(inv?-1:1),wR=Math.cos(a),wI=Math.sin(a);for(let i=0;i<n;i+=len){let cR=1,cI=0;for(let j=0;j<len/2;j++){const x=i+j,y=x+len/2;const tR=re[y]*cR-im[y]*cI,tI=re[y]*cI+im[y]*cR;re[y]=re[x]-tR;im[y]=im[x]-tI;re[x]+=tR;im[x]+=tI;const nc=cR*wR-cI*wI;cI=cR*wI+cI*wR;cR=nc;}}}if(inv){for(let i=0;i<n;i++){re[i]/=n;im[i]/=n;}}}
function fft2d(re,im,inv){const rR=new Float64Array(N),rI=new Float64Array(N);for(let y=0;y<N;y++){const o=y*N;for(let x=0;x<N;x++){rR[x]=re[o+x];rI[x]=im[o+x];}fft1d(rR,rI,inv);for(let x=0;x<N;x++){re[o+x]=rR[x];im[o+x]=rI[x];}}const cR=new Float64Array(N),cI=new Float64Array(N);for(let x=0;x<N;x++){for(let y=0;y<N;y++){cR[y]=re[y*N+x];cI[y]=im[y*N+x];}fft1d(cR,cI,inv);for(let y=0;y<N;y++){re[y*N+x]=cR[y];im[y*N+x]=cI[y];}}}

function createObject(){const V=new Float64Array(N*N),cx=N/2,cy=N/2;function g(x0,y0,sx,sy,a,ang){const ca=Math.cos(ang),sa=Math.sin(ang),r=Math.ceil(Math.max(sx,sy)*4);for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){const px=Math.round(x0)+dx,py=Math.round(y0)+dy;if(px<0||px>=N||py<0||py>=N)continue;const rx=dx*ca+dy*sa,ry=-dx*sa+dy*ca;V[py*N+px]+=a*Math.exp(-0.5*(rx*rx/(sx*sx)+ry*ry/(sy*sy)));}}g(cx,cy,18,24,0.22,0);g(cx-9,cy-8,5,5,0.45,0);g(cx+9,cy-8,5,5,0.45,0);g(cx,cy+6,6,5,0.38,0);g(cx-14,cy+2,3,10,0.40,0.35);g(cx+14,cy+2,3,10,0.40,-0.35);g(cx,cy-18,9,3,0.30,0);g(cx-6,cy+18,8,3,0.25,0.1);g(cx+6,cy+18,8,3,0.25,-0.1);g(cx-4,cy-16,2,2,0.30,0);g(cx+4,cy-16,2,2,0.30,0);g(cx-7,cy+12,2.5,2,0.28,0);g(cx+7,cy+12,2.5,2,0.28,0);g(cx,cy-4,3,3,0.32,0);g(cx,cy-1,4,4,-0.12,0);return V;}

function freqAt(k){return(k<=N/2?k:k-N)/(N*pixelSize);}
function ctfValue(s2,dA){const chi=Math.PI*(dA*lambda*s2-0.5*Cs*lambda*lambda*lambda*s2*s2);return -Math.sin(chi)*Math.exp(-Bfactor*s2/4);}

const objV=createObject();
const objRe=new Float64Array(N*N),objIm=new Float64Array(N*N);
objRe.set(objV);objIm.fill(0);fft2d(objRe,objIm,false);
const objFTRe=new Float64Array(objRe),objFTIm=new Float64Array(objIm);
const imgRe=new Float64Array(N*N),imgIm=new Float64Array(N*N);

function computeImage(nm){const dA=nm*10;for(let ky=0;ky<N;ky++){const sy=freqAt(ky);for(let kx=0;kx<N;kx++){const sx=freqAt(kx),s2=sx*sx+sy*sy,c=ctfValue(s2,dA),i=ky*N+kx;imgRe[i]=objFTRe[i]*c;imgIm[i]=objFTIm[i]*c;}}fft2d(imgRe,imgIm,true);}

// ====== CANVAS CONTEXTS ======
const objCtx=document.getElementById('objCanvas').getContext('2d');
const imgCtx=document.getElementById('imgCanvas').getContext('2d');
const ctfCtx=document.getElementById('ctfCanvas').getContext('2d');
const rayCtx=document.getElementById('rayCanvas').getContext('2d');

// ====== DRAWING FUNCTIONS ======
function drawObject(){
    const id=objCtx.createImageData(N,N);let mx=0;
    for(let i=0;i<N*N;i++)mx=Math.max(mx,Math.abs(objV[i]));
    for(let i=0;i<N*N;i++){const v=Math.max(0,Math.min(255,(objV[i]/mx)*255)),p=i*4;
        id.data[p]=v*0.3;id.data[p+1]=v*0.5;id.data[p+2]=v*0.7;id.data[p+3]=255;}
    objCtx.putImageData(id,0,0);
}

function drawImage(nm){
    const id=imgCtx.createImageData(N,N);
    for(let i=0;i<N*N;i++){const c=imgRe[i]*displayGain,v=Math.max(0,Math.min(255,150+c)),p=i*4;
        id.data[p]=v;id.data[p+1]=v;id.data[p+2]=v;id.data[p+3]=255;}
    imgCtx.putImageData(id,0,0);
    const um=nm/1000;let l=`defocus: ${um.toFixed(3)} μm`;
    if(Math.abs(um)<0.001)l+='';
    else if(Math.abs(um-0.088)<0.005)l+=' (Scherzer)';
    else if(um>0.01)l+=' (under)';
    else if(um<-0.01)l+=' (over)';
    document.getElementById('defocus-badge').textContent=l;
}

function drawCTF(nm){
    const c=ctfCtx.canvas,w=c.width,h=c.height,dA=nm*10;ctfCtx.clearRect(0,0,w,h);
    const m={l:28,r:8,t:5,b:12},pw=w-m.l-m.r,ph=h-m.t-m.b,sMax=0.35;
    ctfCtx.strokeStyle='#e0e0e8';ctfCtx.lineWidth=0.5;
    ctfCtx.beginPath();ctfCtx.moveTo(m.l,m.t+ph/2);ctfCtx.lineTo(m.l+pw,m.t+ph/2);ctfCtx.stroke();
    const lineColor = nm < -5 ? '#dc2626' : nm > 5 ? '#2563eb' : '#059669';
    const fillColor = nm < -5 ? 'rgba(220,38,38,0.06)' : nm > 5 ? 'rgba(37,99,235,0.06)' : 'rgba(5,150,105,0.06)';
    ctfCtx.beginPath();ctfCtx.moveTo(m.l,m.t+ph/2);
    for(let i=0;i<=pw;i++){const s=(i/pw)*sMax,s2=s*s,v=ctfValue(s2,dA);ctfCtx.lineTo(m.l+i,m.t+ph/2-v*(ph/2)*0.9);}
    ctfCtx.lineTo(m.l+pw,m.t+ph/2);ctfCtx.closePath();ctfCtx.fillStyle=fillColor;ctfCtx.fill();
    ctfCtx.strokeStyle=lineColor;ctfCtx.lineWidth=1.5;ctfCtx.beginPath();
    for(let i=0;i<=pw;i++){const s=(i/pw)*sMax,s2=s*s,v=ctfValue(s2,dA);const x=m.l+i,y=m.t+ph/2-v*(ph/2)*0.9;i===0?ctfCtx.moveTo(x,y):ctfCtx.lineTo(x,y);}
    ctfCtx.stroke();
    ctfCtx.fillStyle='#999';ctfCtx.font='10px Inter,sans-serif';
    ctfCtx.fillText('1',m.l-12,m.t+8);ctfCtx.fillText('-1',m.l-14,m.t+ph);
    ctfCtx.fillText('0',m.l-2,m.t+ph+11);ctfCtx.fillText(sMax.toFixed(2),m.l+pw-18,m.t+ph+11);
}

// ====== RAY DIAGRAM ======
function drawRayDiagram(nm) {
    const c = rayCtx.canvas, w = c.width, h = c.height;
    rayCtx.clearRect(0, 0, w, h);
    const um = nm / 1000;
    const cx = w / 2;

    // --- Layout proportions (use full vertical space) ---
    const objY = h * 0.03;       // object label
    const specY = h * 0.08;      // specimen plane
    const lensY = h * 0.24;      // objective lens center
    const lensR = h * 0.042;     // lens half-height (slightly bigger)
    // BFP shifts slightly with defocus (focal length changes)
    const bfpBase = h * 0.36;
    const bfpShift = Math.max(-h * 0.04, Math.min(h * 0.04, (nm / 1000) * h * 0.04));
    const bfpY = bfpBase + bfpShift; // underfocus: BFP lower, overfocus: BFP higher
    const detY = h * 0.53;       // detector (fixed)
    const planeW = w * 0.54;     // wider planes
    const lensW = w * 0.36;      // wider lens

    // Image plane: sqrt-scaled shift for visibility
    const baseFocalY = detY;
    const sign = nm >= 0 ? 1 : -1;
    const scaledShift = sign * Math.sqrt(Math.abs(nm) / 1000) * h * 0.22;
    const focalShift = Math.max(-h * 0.14, Math.min(h * 0.28, scaledShift));
    const imgPlaneY = baseFocalY + focalShift;

    // State
    const isInFocus = Math.abs(um) < 0.01;
    const isUnder = um > 0.01;
    const isOver = um < -0.01;
    const stateColor = isOver ? '#dc2626' : isUnder ? '#2563eb' : '#059669';
    const stateBg = isOver ? '#fef2f2' : isUnder ? '#eff6ff' : '#ecfdf5';

    // Font sizes
    const fXL = Math.round(h * 0.032);
    const fLG = Math.round(h * 0.026);
    const fMD = Math.round(h * 0.022);
    const fSM = Math.round(h * 0.018);
    const fXS = Math.round(h * 0.015);

    // Helper: draw text with white background (prevents overlap with lines)
    function labelWithBg(text, x, y, font, color, align) {
        rayCtx.font = font;
        rayCtx.textAlign = align || 'left';
        const m = rayCtx.measureText(text);
        const pad = 4;
        const sz = parseInt((font.match(/(\d+)px/) || [])[1]) || fSM;
        let lx = x;
        if (align === 'center') lx = x - m.width / 2;
        else if (align === 'right') lx = x - m.width;
        // else left: lx = x (default)
        rayCtx.fillStyle = 'rgba(250,250,250,0.92)';
        rayCtx.fillRect(lx - pad, y - sz * 0.9, m.width + pad * 2, sz * 1.3);
        rayCtx.fillStyle = color;
        rayCtx.fillText(text, x, y);
    }

    // --- Background ---
    rayCtx.fillStyle = '#fafafa';
    rayCtx.fillRect(0, 0, w, h);

    // --- Defocus zone shading (subtle gradient) ---
    if (!isInFocus) {
        if (isOver) {
            const g = rayCtx.createLinearGradient(0, lensY + lensR, 0, detY);
            g.addColorStop(0, 'rgba(220,38,38,0)');
            g.addColorStop(1, 'rgba(220,38,38,0.04)');
            rayCtx.fillStyle = g;
            rayCtx.fillRect(0, lensY + lensR, w, detY - lensY - lensR);
        } else {
            const g = rayCtx.createLinearGradient(0, detY, 0, detY + h * 0.26);
            g.addColorStop(0, 'rgba(37,99,235,0.04)');
            g.addColorStop(1, 'rgba(37,99,235,0)');
            rayCtx.fillStyle = g;
            rayCtx.fillRect(0, detY, w, h * 0.26);
        }
    }

    // --- Ray colors (3 specimen points for clarity) ---
    const rayColors = ['#dc2626', '#059669', '#2563eb'];
    const specPts = [-0.22, 0, 0.22];

    // --- Object / Specimen ---
    rayCtx.fillStyle = '#333';
    rayCtx.font = `700 ${fLG}px Inter,sans-serif`;
    rayCtx.textAlign = 'center';
    rayCtx.fillText('Object (specimen)', cx, objY + fLG * 0.4);

    // Specimen plane - thick black line
    rayCtx.strokeStyle = '#222';
    rayCtx.lineWidth = 3;
    rayCtx.beginPath();
    rayCtx.moveTo(cx - planeW/2, specY);
    rayCtx.lineTo(cx + planeW/2, specY);
    rayCtx.stroke();

    // Specimen feature dots
    for (let i = 0; i < specPts.length; i++) {
        const sx = cx + specPts[i] * planeW;
        rayCtx.fillStyle = rayColors[i];
        rayCtx.beginPath();
        rayCtx.arc(sx, specY, 6, 0, Math.PI * 2);
        rayCtx.fill();
    }

    // --- Incident beam (parallel arrows from top) ---
    rayCtx.strokeStyle = '#555';
    rayCtx.lineWidth = 1.5;
    rayCtx.setLineDash([]);
    for (const frac of [-0.15, -0.075, 0, 0.075, 0.15]) {
        const bx = cx + frac * planeW;
        rayCtx.beginPath();
        rayCtx.moveTo(bx, 0);
        rayCtx.lineTo(bx, specY - 8);
        rayCtx.stroke();
        rayCtx.fillStyle = '#555';
        rayCtx.beginPath();
        rayCtx.moveTo(bx - 4, specY - 14);
        rayCtx.lineTo(bx, specY - 5);
        rayCtx.lineTo(bx + 4, specY - 14);
        rayCtx.fill();
    }
    rayCtx.fillStyle = '#333';
    rayCtx.font = `600 ${fSM}px Inter,sans-serif`;
    rayCtx.textAlign = 'left';
    rayCtx.fillText('e⁻ beam', cx + 0.18 * planeW, h * 0.03);

    // --- Objective Lens (continuous biconvex + arms) ---
    const lensBulge = lensW * 0.18;          // bulge depth for each curved surface
    const lensHalf  = lensW * 0.35;          // half-width of the biconvex body
    const lensTop   = lensY - lensR * 1.1;   // top vertex
    const lensBot   = lensY + lensR * 1.1;   // bottom vertex
    // Fill — semi-transparent blue tint
    rayCtx.fillStyle = 'rgba(130,180,240,0.35)';
    rayCtx.beginPath();
    rayCtx.moveTo(cx, lensTop);
    rayCtx.quadraticCurveTo(cx - lensHalf - lensBulge, lensY, cx, lensBot);
    rayCtx.quadraticCurveTo(cx + lensHalf + lensBulge, lensY, cx, lensTop);
    rayCtx.closePath();
    rayCtx.fill();
    // Stroke — outline
    rayCtx.strokeStyle = '#333';
    rayCtx.lineWidth = 2.5;
    rayCtx.beginPath();
    rayCtx.moveTo(cx, lensTop);
    rayCtx.quadraticCurveTo(cx - lensHalf - lensBulge, lensY, cx, lensBot);
    rayCtx.stroke();
    rayCtx.beginPath();
    rayCtx.moveTo(cx, lensBot);
    rayCtx.quadraticCurveTo(cx + lensHalf + lensBulge, lensY, cx, lensTop);
    rayCtx.stroke();
    // Horizontal arms extending outward from lens vertices
    rayCtx.lineWidth = 2;
    rayCtx.beginPath();
    rayCtx.moveTo(cx, lensTop); rayCtx.lineTo(cx - lensW/2, lensTop);
    rayCtx.moveTo(cx, lensBot); rayCtx.lineTo(cx - lensW/2, lensBot);
    rayCtx.moveTo(cx, lensTop); rayCtx.lineTo(cx + lensW/2, lensTop);
    rayCtx.moveTo(cx, lensBot); rayCtx.lineTo(cx + lensW/2, lensBot);
    rayCtx.stroke();
    // Converging arrowheads at top & bottom vertices
    rayCtx.fillStyle = '#333';
    const aw = 5, ah = 8;
    // Top vertex — two inward arrows
    rayCtx.beginPath();
    rayCtx.moveTo(cx - aw, lensTop - ah); rayCtx.lineTo(cx, lensTop);
    rayCtx.lineTo(cx + aw, lensTop - ah); rayCtx.closePath(); rayCtx.fill();
    // Bottom vertex — two inward arrows
    rayCtx.beginPath();
    rayCtx.moveTo(cx - aw, lensBot + ah); rayCtx.lineTo(cx, lensBot);
    rayCtx.lineTo(cx + aw, lensBot + ah); rayCtx.closePath(); rayCtx.fill();

    // Lens label
    labelWithBg('Objective Lens', cx + planeW * 0.42, lensY + fMD * 0.35,
        `700 ${fMD}px Inter,sans-serif`, '#333', 'left');

    // --- Colored rays: 2 marginal + 1 chief per specimen point ---
    for (let i = 0; i < specPts.length; i++) {
        const sx = cx + specPts[i] * planeW;
        const ix = cx - specPts[i] * planeW * 0.8; // inverted image position
        const color = rayColors[i];
        const targetY = isInFocus ? detY : imgPlaneY;

        // Collect detector crossing X values for disk-of-confusion bar
        const detCrossXs = [];

        // ── Two marginal rays ──
        const lensHitFracs = [-0.4, 0.4];
        for (const frac of lensHitFracs) {
            const lensHitX = cx + frac * lensW * 0.45;
            // Part 1: Specimen → Lens (diverging)
            rayCtx.strokeStyle = color;
            rayCtx.lineWidth = 2;
            rayCtx.globalAlpha = 0.7;
            rayCtx.beginPath();
            rayCtx.moveTo(sx, specY + 3);
            rayCtx.lineTo(lensHitX, lensY);
            rayCtx.stroke();
            // Part 2: Lens → Image point (converging, bent)
            rayCtx.beginPath();
            rayCtx.moveTo(lensHitX, lensY);
            rayCtx.lineTo(ix, targetY);
            rayCtx.stroke();

            // If defocused: extension + detector crossing
            if (!isInFocus && Math.abs(targetY - detY) > 8) {
                const t = (detY - lensY) / (targetY - lensY);
                const detCrossX = lensHitX + (ix - lensHitX) * t;
                detCrossXs.push(detCrossX);
                // Dashed extension
                rayCtx.globalAlpha = 0.2;
                rayCtx.setLineDash([4, 4]);
                rayCtx.beginPath();
                if (isUnder) {
                    rayCtx.moveTo(detCrossX, detY);
                    rayCtx.lineTo(ix, targetY);
                } else {
                    rayCtx.moveTo(ix, targetY);
                    rayCtx.lineTo(detCrossX, detY);
                }
                rayCtx.stroke();
                rayCtx.setLineDash([]);
                rayCtx.globalAlpha = 0.7;
            }
        }

        // ── Chief ray (through lens center, undeviated) ──
        rayCtx.strokeStyle = color;
        rayCtx.lineWidth = 1.2;
        rayCtx.globalAlpha = 0.35;
        rayCtx.beginPath();
        rayCtx.moveTo(sx, specY + 3);
        rayCtx.lineTo(cx, lensY);
        rayCtx.stroke();
        // Chief ray continues straight after lens center
        const chiefDx = cx - sx;
        const chiefDy = lensY - specY;
        const chiefExtY = Math.max(targetY, detY) + 10;
        const chiefExtX = cx + chiefDx * ((chiefExtY - lensY) / chiefDy);
        rayCtx.beginPath();
        rayCtx.moveTo(cx, lensY);
        rayCtx.lineTo(chiefExtX, chiefExtY);
        rayCtx.stroke();
        rayCtx.globalAlpha = 1.0;

        // ── Disk of confusion bar at detector (replaces small dots) ──
        if (!isInFocus && detCrossXs.length === 2) {
            const barLeft = Math.min(detCrossXs[0], detCrossXs[1]);
            const barRight = Math.max(detCrossXs[0], detCrossXs[1]);
            const barH = 16;
            // Semi-transparent fill bar
            rayCtx.fillStyle = color;
            rayCtx.globalAlpha = 0.18;
            rayCtx.fillRect(barLeft, detY - barH/2, barRight - barLeft, barH);
            // Outline
            rayCtx.globalAlpha = 0.5;
            rayCtx.strokeStyle = color;
            rayCtx.lineWidth = 1;
            rayCtx.strokeRect(barLeft, detY - barH/2, barRight - barLeft, barH);
            rayCtx.globalAlpha = 1.0;
        }

        // ── Convergence point / In-focus detector dot ──
        if (isInFocus) {
            // In-focus: show sharp image dots on detector (inverted specimen)
            rayCtx.globalAlpha = 0.95;
            rayCtx.fillStyle = color;
            rayCtx.beginPath();
            rayCtx.arc(ix, detY, 6, 0, Math.PI * 2);
            rayCtx.fill();
            // Small highlight ring
            rayCtx.strokeStyle = color;
            rayCtx.lineWidth = 1.5;
            rayCtx.globalAlpha = 0.3;
            rayCtx.beginPath();
            rayCtx.arc(ix, detY, 11, 0, Math.PI * 2);
            rayCtx.stroke();
            rayCtx.globalAlpha = 1.0;
        } else {
            rayCtx.globalAlpha = 0.9;
            rayCtx.fillStyle = color;
            rayCtx.beginPath();
            rayCtx.arc(ix, targetY, 5, 0, Math.PI * 2);
            rayCtx.fill();
            rayCtx.globalAlpha = 1.0;
        }
    }

    // --- Back Focal Plane (BFP) dashed line ---
    rayCtx.strokeStyle = '#999';
    rayCtx.lineWidth = 1.5;
    rayCtx.setLineDash([8, 5]);
    rayCtx.beginPath();
    rayCtx.moveTo(cx - planeW * 0.4, bfpY);
    rayCtx.lineTo(cx + planeW * 0.4, bfpY);
    rayCtx.stroke();
    rayCtx.setLineDash([]);
    const bfpLabel = isInFocus ? 'Back Focal Plane (f)' :
        isUnder ? 'BFP (f↑ longer)' : 'BFP (f↓ shorter)';
    labelWithBg(bfpLabel, cx + planeW * 0.42, bfpY + fSM * 0.4,
        `500 ${fSM}px Inter,sans-serif`, '#666', 'left');

    // BFP position tracker triangle (colored, shows shift direction)
    if (!isInFocus) {
        const mkX = cx + planeW * 0.4 + 8;
        rayCtx.fillStyle = stateColor;
        rayCtx.globalAlpha = 0.6;
        rayCtx.beginPath();
        rayCtx.moveTo(mkX, bfpY - 6);
        rayCtx.lineTo(mkX + 10, bfpY);
        rayCtx.lineTo(mkX, bfpY + 6);
        rayCtx.closePath();
        rayCtx.fill();
        rayCtx.globalAlpha = 1.0;
    }

    // --- Image Plane (moves with defocus) ---
    if (!isInFocus) {
        rayCtx.strokeStyle = stateColor;
        rayCtx.lineWidth = 2.5;
        rayCtx.setLineDash([10, 5]);
        rayCtx.beginPath();
        rayCtx.moveTo(cx - planeW * 0.4, imgPlaneY);
        rayCtx.lineTo(cx + planeW * 0.4, imgPlaneY);
        rayCtx.stroke();
        rayCtx.setLineDash([]);
        labelWithBg('Image Plane', cx + planeW * 0.42, imgPlaneY + fSM * 0.4,
            `600 ${fSM}px Inter,sans-serif`, stateColor, 'left');
    }

    // --- Detector / Recording plane (fixed) ---
    rayCtx.strokeStyle = '#222';
    rayCtx.lineWidth = 3;
    rayCtx.beginPath();
    rayCtx.moveTo(cx - planeW/2, detY);
    rayCtx.lineTo(cx + planeW/2, detY);
    rayCtx.stroke();

    // Detector icon (small camera)
    rayCtx.fillStyle = '#444';
    const camX = cx - planeW/2 - 50;
    const camW = 36, camH = 24;
    rayCtx.fillRect(camX, detY - camH/2, camW, camH);
    rayCtx.fillStyle = '#888';
    rayCtx.beginPath();
    rayCtx.arc(camX + camW/2, detY, 8, 0, Math.PI * 2);
    rayCtx.fill();
    const detLabel = isInFocus ? 'Detector = Image Plane' : 'Detector';
    labelWithBg(detLabel, cx + planeW * 0.42, detY + fSM * 0.4,
        `600 ${fSM}px Inter,sans-serif`, '#333', 'left');

    // --- Δf arrow (between detector and image plane) ---
    if (!isInFocus) {
        const arrowX = cx - planeW * 0.46;
        rayCtx.strokeStyle = stateColor;
        rayCtx.lineWidth = 2.5;
        rayCtx.beginPath();
        rayCtx.moveTo(arrowX, detY);
        rayCtx.lineTo(arrowX, imgPlaneY);
        rayCtx.stroke();
        // Arrowheads
        const dir = imgPlaneY > detY ? 1 : -1;
        rayCtx.fillStyle = stateColor;
        rayCtx.beginPath();
        rayCtx.moveTo(arrowX - 7, imgPlaneY);
        rayCtx.lineTo(arrowX + 7, imgPlaneY);
        rayCtx.lineTo(arrowX, imgPlaneY + dir * 12);
        rayCtx.fill();
        rayCtx.beginPath();
        rayCtx.moveTo(arrowX - 7, detY);
        rayCtx.lineTo(arrowX + 7, detY);
        rayCtx.lineTo(arrowX, detY - dir * 12);
        rayCtx.fill();
        // Δf label
        rayCtx.fillStyle = stateColor;
        rayCtx.font = `700 ${fLG}px Inter,sans-serif`;
        rayCtx.textAlign = 'center';
        const mid = (detY + imgPlaneY) / 2;
        rayCtx.fillText('Δf', arrowX - fLG * 1.2, mid + fLG * 0.35);
    }

    // --- State badge (dynamic position, always below image plane) ---
    let stateText = '';
    if (isInFocus) stateText = 'IN FOCUS';
    else if (isUnder) stateText = 'UNDERFOCUS';
    else stateText = 'OVERFOCUS';

    rayCtx.font = `800 ${fXL}px Inter,sans-serif`;
    const tw = rayCtx.measureText(stateText).width + 50;
    const badgeY = Math.max(imgPlaneY + fLG * 2.5, h * 0.82);
    // Badge background
    rayCtx.fillStyle = stateBg;
    rayCtx.strokeStyle = stateColor;
    rayCtx.lineWidth = 2;
    rayCtx.beginPath();
    rayCtx.roundRect(cx - tw/2, badgeY, tw, fXL * 1.8, 14);
    rayCtx.fill();
    rayCtx.stroke();
    // Badge text
    rayCtx.fillStyle = stateColor;
    rayCtx.textAlign = 'center';
    rayCtx.fillText(stateText, cx, badgeY + fXL * 1.3);

    // Sub-label
    rayCtx.fillStyle = '#888';
    rayCtx.font = `500 ${fSM}px Inter,sans-serif`;
    let subText = '';
    if (isInFocus) subText = 'Lens exactly focused — image plane at detector';
    else if (isUnder) subText = 'Lens weaker (f↑) → image plane below detector';
    else subText = 'Lens stronger (f↓) → image plane above detector';
    rayCtx.fillText(subText, cx, badgeY + fXL * 1.8 + fSM * 1.2);
}

// ====== INFO PANEL ======
function updateInfo(nm) {
    const um = nm / 1000, el = document.getElementById('info-card');
    const dA = nm * 10;
    const firstZero = dA > 0 ? (1 / Math.sqrt(lambda * dA)).toFixed(3)
                    : dA < 0 ? (1 / Math.sqrt(lambda * Math.abs(dA))).toFixed(3) : '—';
    let rms = 0;
    for (let i = 0; i < N*N; i++) rms += imgRe[i]*imgRe[i];
    rms = Math.sqrt(rms / (N*N));
    const contrastPct = Math.min(100, (rms / 0.025 * 100)).toFixed(0);

    let stage, stageClass, title, observe, physics;

    if (Math.abs(um) < 0.01) {
        stage = 'IN FOCUS'; stageClass = 'stage-focus';
        title = 'No phase contrast — image is nearly blank';
        observe = 'Image shows <span>uniform gray</span>. Rays converge <span>exactly at detector</span>. CTF = 0 everywhere.';
        physics = 'Biological specimens are <b>weak phase objects</b>. At exact focus, phase shifts do not convert to amplitude. CTF = −sin(χ) = 0 when Δf = 0.';
    } else if (um > 0) {
        stage = 'UNDERFOCUS'; stageClass = 'stage-under';
        if (Math.abs(um - 0.088) < 0.015) {
            title = 'Scherzer defocus — optimal resolution';
            observe = 'Rays converge <span>slightly below</span> detector. <span>Faint image</span> appears. CTF: <span>single broad passband</span>.';
            physics = `<b>Scherzer defocus</b> Δf = 1.2√(Cs·λ) ≈ 875 Å maximizes CTF passband. Lens slightly <b>weaker</b>, image plane below detector.`;
        } else if (um < 0.3) {
            title = 'Mild underfocus — contrast building';
            observe = 'Image plane <span>slightly below</span> detector. Object features begin to appear.';
            physics = `<b>Lens too weak</b> (focal length too long). Image forms below detector. Phase → amplitude contrast conversion begins.`;
        } else if (um < 1.0) {
            title = 'Standard cryo-EM defocus range';
            observe = 'Image plane <span>well below</span> detector. Structure <span>clearly visible</span>. CTF creates "Thon rings".';
            physics = `<b>Typical range</b> for single particle (0.5–1.5 μm). Strong contrast for <b>particle picking</b>. CTF correction restores info at zero crossings.`;
        } else {
            title = 'High underfocus — strong but delocalized';
            observe = '<span>Fresnel fringes</span> appear. Rays far from convergence. CTF oscillates rapidly.';
            physics = `<b>PSF broadens</b>. High-res info <b>delocalized</b>. Max contrast but degraded spatial resolution.`;
        }
    } else {
        stage = 'OVERFOCUS'; stageClass = 'stage-over';
        title = 'Lens too strong — reversed contrast';
        observe = 'Rays converge <span>above</span> detector, then diverge. <span>Inverted contrast</span>.';
        physics = `<b>Lens too strong</b> (focal length too short). Image above detector. Electrons cross over. CTF sign reverses: <b>sin(χ) flips</b>.`;
    }

    el.innerHTML = `
        <div class="info-stage ${stageClass}">${stage}</div>
        <div class="info-title">${title}</div>
        <div class="info-observe">${observe}</div>
        <div class="info-physics">${physics}</div>
        <div class="info-stat">
            <div><div class="val">${um.toFixed(3)}</div><div class="lbl">Defocus (μm)</div></div>
            <div><div class="val">${contrastPct}%</div><div class="lbl">Rel. Contrast</div></div>
            <div><div class="val">${firstZero}</div><div class="lbl">1st zero (Å⁻¹)</div></div>
        </div>`;
}

// ====== MAIN UPDATE ======
function update(nm) {
    computeImage(nm);
    drawImage(nm);
    drawCTF(nm);
    drawRayDiagram(nm);
    updateInfo(nm);
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    const pm={'-300':0, 0:1, 88:2, 500:3, 1000:4};
    if(pm[String(nm)]!==undefined) document.querySelectorAll('.pill')[pm[String(nm)]].classList.add('active');
}

// ====== CONTROLS ======
let playing=false,animId=null,cur=0;
function onSlider(){cur=parseFloat(document.getElementById('defocus-slider').value);document.getElementById('slider-label').textContent=(cur/1000).toFixed(3)+' μm';update(cur);}
function setDefocus(nm){cur=nm;document.getElementById('defocus-slider').value=nm;document.getElementById('slider-label').textContent=(nm/1000).toFixed(3)+' μm';update(nm);}
function togglePlay(){playing=!playing;document.getElementById('play-btn').textContent=playing?'⏸':'▶';if(playing)animate();else if(animId){cancelAnimationFrame(animId);animId=null;}}
function animate(){if(!playing)return;cur+=4;if(cur>1500)cur=-500;document.getElementById('defocus-slider').value=cur;document.getElementById('slider-label').textContent=(cur/1000).toFixed(3)+' μm';update(cur);animId=requestAnimationFrame(animate);}

// ====== INIT ======
drawObject();
update(0);
</script>
