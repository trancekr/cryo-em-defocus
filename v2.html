<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryo-EM Defocus Contrast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0f0f1a;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e0e0e8;
    min-height: 100vh;
    display: flex; justify-content: center; padding: 24px;
}
#app { max-width: 1020px; width: 100%; }

/* Header */
.header {
    text-align: center; margin-bottom: 28px;
}
.header h1 {
    font-size: 22px; font-weight: 600; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p { font-size: 13px; color: #666; margin-top: 4px; }

/* Cards */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    backdrop-filter: blur(12px);
}
.card-label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 1px; color: #888; padding: 10px 14px 6px;
}

/* Main grid */
.main-grid {
    display: grid;
    grid-template-columns: 280px 280px 1fr;
    gap: 14px; margin-bottom: 14px;
}
.canvas-card canvas {
    display: block; width: 280px; height: 280px;
    border-radius: 0 0 11px 11px;
}
#defocus-badge {
    text-align: center; padding: 8px;
    font-size: 13px; font-weight: 500; color: #a78bfa;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-variant-numeric: tabular-nums;
}
.info-card {
    padding: 20px; font-size: 13.5px; line-height: 1.7;
    display: flex; align-items: center; color: #bbb;
}
.info-card ul { padding-left: 16px; }
.info-card li { margin-bottom: 10px; }
.info-card b { color: #60a5fa; font-weight: 600; }

/* Profiles row */
.profiles {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px;
}
.profiles canvas { display: block; width: 100%; height: 110px; }
.profiles .axis { text-align: center; font-size: 10px; color: #555; padding: 2px 0 6px; }

/* CTF row */
.ctf-row { margin-bottom: 20px; }
.ctf-row canvas { display: block; width: 100%; height: 80px; }
.ctf-row .axis { text-align: center; font-size: 10px; color: #555; padding: 2px 0 6px; }

/* Controls */
.controls {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 16px 20px;
}
.play-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: linear-gradient(135deg, #60a5fa, #818cf8);
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(96,165,250,0.3);
}
.play-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(96,165,250,0.5); }

/* Custom slider */
.slider-wrap { flex: 1; min-width: 180px; position: relative; }
input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px;
    background: rgba(255,255,255,0.1); border-radius: 3px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #818cf8; cursor: pointer;
    box-shadow: 0 0 8px rgba(129,140,248,0.5);
}
.slider-val {
    font-size: 14px; font-weight: 600; color: #a78bfa;
    min-width: 90px; text-align: right; font-variant-numeric: tabular-nums;
}

/* Preset pills */
.presets { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #aaa; font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
}
.pill:hover { background: rgba(129,140,248,0.15); color: #c4b5fd; border-color: rgba(129,140,248,0.3); }
.pill.active { background: rgba(129,140,248,0.2); color: #a78bfa; border-color: #818cf8; }
</style>
</head>
<body>
<div id="app">
    <div class="header">
        <h1>Cryo-EM Defocus Contrast Simulation</h1>
        <p>300 kV · Cs = 2.7 mm · Weak phase object CTF model</p>
    </div>

    <div class="main-grid">
        <div class="card canvas-card">
            <div class="card-label">Object (Projected Potential)</div>
            <canvas id="objCanvas" width="256" height="256"></canvas>
        </div>
        <div class="card canvas-card">
            <div class="card-label">Simulated Image</div>
            <canvas id="imgCanvas" width="256" height="256"></canvas>
            <div id="defocus-badge">defocus: 0.000 μm</div>
        </div>
        <div class="card info-card">
            <div id="info-text"></div>
        </div>
    </div>

    <div class="profiles">
        <div class="card">
            <div class="card-label">Object Line Profile</div>
            <canvas id="objProfile" width="600" height="110"></canvas>
            <div class="axis">X coordinate, Å</div>
        </div>
        <div class="card">
            <div class="card-label">Image Line Profile</div>
            <canvas id="imgProfile" width="600" height="110"></canvas>
            <div class="axis">X coordinate, Å</div>
        </div>
    </div>

    <div class="ctf-row">
        <div class="card">
            <div class="card-label">Contrast Transfer Function</div>
            <canvas id="ctfCanvas" width="900" height="80"></canvas>
            <div class="axis">Spatial frequency (Å⁻¹)</div>
        </div>
    </div>

    <div class="card controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <div class="slider-wrap">
            <input type="range" id="defocus-slider" min="-200" max="3000" step="1" value="0" oninput="onSlider()">
        </div>
        <span class="slider-val" id="slider-label">0.000 μm</span>
        <div class="presets" id="presets">
            <button class="pill active" onclick="setDefocus(0)">In focus</button>
            <button class="pill" onclick="setDefocus(88)">Scherzer</button>
            <button class="pill" onclick="setDefocus(500)">0.5 μm</button>
            <button class="pill" onclick="setDefocus(1000)">1.0 μm</button>
            <button class="pill" onclick="setDefocus(2000)">2.0 μm</button>
            <button class="pill" onclick="setDefocus(3000)">3.0 μm</button>
        </div>
    </div>
</div>

<script>
const N = 256, pixelSize = 1.0, lambda = 0.01969, Cs = 2.7e7, Bfactor = 60, displayGain = 500;

function fft1d(re, im, inv) {
    const n = re.length;
    for (let i = 1, j = 0; i < n; i++) {
        let b = n >> 1; for (; j & b; b >>= 1) j ^= b; j ^= b;
        if (i < j) { let t = re[i]; re[i] = re[j]; re[j] = t; t = im[i]; im[i] = im[j]; im[j] = t; }
    }
    for (let len = 2; len <= n; len <<= 1) {
        const a = 2 * Math.PI / len * (inv ? -1 : 1), wR = Math.cos(a), wI = Math.sin(a);
        for (let i = 0; i < n; i += len) {
            let cR = 1, cI = 0;
            for (let j = 0; j < len / 2; j++) {
                const x = i + j, y = x + len / 2;
                const tR = re[y]*cR - im[y]*cI, tI = re[y]*cI + im[y]*cR;
                re[y] = re[x] - tR; im[y] = im[x] - tI;
                re[x] += tR; im[x] += tI;
                const nc = cR*wR - cI*wI; cI = cR*wI + cI*wR; cR = nc;
            }
        }
    }
    if (inv) { for (let i = 0; i < n; i++) { re[i] /= n; im[i] /= n; } }
}
function fft2d(re, im, inv) {
    const rR = new Float64Array(N), rI = new Float64Array(N);
    for (let y = 0; y < N; y++) {
        const o = y*N; for (let x = 0; x < N; x++) { rR[x]=re[o+x]; rI[x]=im[o+x]; }
        fft1d(rR,rI,inv); for (let x = 0; x < N; x++) { re[o+x]=rR[x]; im[o+x]=rI[x]; }
    }
    const cR = new Float64Array(N), cI = new Float64Array(N);
    for (let x = 0; x < N; x++) {
        for (let y = 0; y < N; y++) { cR[y]=re[y*N+x]; cI[y]=im[y*N+x]; }
        fft1d(cR,cI,inv); for (let y = 0; y < N; y++) { re[y*N+x]=cR[y]; im[y*N+x]=cI[y]; }
    }
}

function createObject() {
    const V = new Float64Array(N*N), cx = N/2, cy = N/2;
    function g(x0,y0,sx,sy,a,ang) {
        const ca=Math.cos(ang),sa=Math.sin(ang),r=Math.ceil(Math.max(sx,sy)*4);
        for (let dy=-r;dy<=r;dy++) for (let dx=-r;dx<=r;dx++) {
            const px=Math.round(x0)+dx,py=Math.round(y0)+dy;
            if(px<0||px>=N||py<0||py>=N) continue;
            const rx=dx*ca+dy*sa,ry=-dx*sa+dy*ca;
            V[py*N+px]+=a*Math.exp(-0.5*(rx*rx/(sx*sx)+ry*ry/(sy*sy)));
        }
    }
    g(cx,cy,18,24,0.22,0);
    g(cx-9,cy-8,5,5,0.45,0); g(cx+9,cy-8,5,5,0.45,0); g(cx,cy+6,6,5,0.38,0);
    g(cx-14,cy+2,3,10,0.40,0.35); g(cx+14,cy+2,3,10,0.40,-0.35); g(cx,cy-18,9,3,0.30,0);
    g(cx-6,cy+18,8,3,0.25,0.1); g(cx+6,cy+18,8,3,0.25,-0.1);
    g(cx-4,cy-16,2,2,0.30,0); g(cx+4,cy-16,2,2,0.30,0);
    g(cx-7,cy+12,2.5,2,0.28,0); g(cx+7,cy+12,2.5,2,0.28,0);
    g(cx,cy-4,3,3,0.32,0); g(cx,cy-1,4,4,-0.12,0);
    return V;
}

function freqAt(k) { return (k<=N/2?k:k-N)/(N*pixelSize); }
function ctfValue(s2,dA) {
    const chi = Math.PI*(dA*lambda*s2 - 0.5*Cs*lambda*lambda*lambda*s2*s2);
    return -Math.sin(chi)*Math.exp(-Bfactor*s2/4);
}

const objV = createObject();
const objRe = new Float64Array(N*N), objIm = new Float64Array(N*N);
objRe.set(objV); objIm.fill(0); fft2d(objRe,objIm,false);
const objFTRe = new Float64Array(objRe), objFTIm = new Float64Array(objIm);
const imgRe = new Float64Array(N*N), imgIm = new Float64Array(N*N);

function computeImage(nm) {
    const dA = nm * 10;
    for (let ky=0;ky<N;ky++) { const sy=freqAt(ky);
        for (let kx=0;kx<N;kx++) { const sx=freqAt(kx),s2=sx*sx+sy*sy,c=ctfValue(s2,dA),i=ky*N+kx;
            imgRe[i]=objFTRe[i]*c; imgIm[i]=objFTIm[i]*c;
        }
    }
    fft2d(imgRe,imgIm,true);
}

// Drawing
const objCtx=document.getElementById('objCanvas').getContext('2d');
const imgCtx=document.getElementById('imgCanvas').getContext('2d');
const oPCtx=document.getElementById('objProfile').getContext('2d');
const iPCtx=document.getElementById('imgProfile').getContext('2d');
const ctfCtx=document.getElementById('ctfCanvas').getContext('2d');

function drawObject() {
    const id=objCtx.createImageData(N,N); let mx=0;
    for(let i=0;i<N*N;i++) mx=Math.max(mx,Math.abs(objV[i]));
    for(let i=0;i<N*N;i++){
        const v=Math.max(0,Math.min(255,(objV[i]/mx)*255)),p=i*4;
        id.data[p]=v*0.7; id.data[p+1]=v*0.85; id.data[p+2]=v; id.data[p+3]=255;
    }
    objCtx.putImageData(id,0,0);
    objCtx.strokeStyle='rgba(129,140,248,0.4)'; objCtx.lineWidth=1;
    objCtx.beginPath(); objCtx.moveTo(0,N/2); objCtx.lineTo(N,N/2); objCtx.stroke();
}

function drawImage(nm) {
    const id=imgCtx.createImageData(N,N);
    for(let i=0;i<N*N;i++){
        const c=imgRe[i]*displayGain, v=Math.max(0,Math.min(255,150+c)), p=i*4;
        id.data[p]=v; id.data[p+1]=v; id.data[p+2]=v; id.data[p+3]=255;
    }
    imgCtx.putImageData(id,0,0);
    imgCtx.strokeStyle='rgba(129,140,248,0.4)'; imgCtx.lineWidth=1;
    imgCtx.beginPath(); imgCtx.moveTo(0,N/2); imgCtx.lineTo(N,N/2); imgCtx.stroke();
    const um=nm/1000;
    let l=`defocus: ${um.toFixed(3)} μm`;
    if(Math.abs(um)<0.001) l+='';
    else if(Math.abs(um-0.088)<0.005) l+=' (Scherzer)';
    else if(um>0.01) l+=' under'; else if(um<-0.01) l+=' over';
    document.getElementById('defocus-badge').textContent=l;
}

function drawProfile(ctx,data,yMid,color,yRange) {
    const c=ctx.canvas, w=c.width, h=c.height;
    ctx.clearRect(0,0,w,h);
    const m={l:45,r:8,t:8,b:20}, pw=w-m.l-m.r, ph=h-m.t-m.b;
    // Grid
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(m.l,m.t+ph/2); ctx.lineTo(m.l+pw,m.t+ph/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(m.l+pw/2,m.t); ctx.lineTo(m.l+pw/2,m.t+ph); ctx.stroke();
    // Labels
    ctx.fillStyle='#555'; ctx.font='9px Inter, sans-serif';
    ctx.fillText(`-${N/2}`,m.l-2,m.t+ph+14);
    ctx.fillText('0',m.l+pw/2-3,m.t+ph+14);
    ctx.fillText(`${N/2}`,m.l+pw-14,m.t+ph+14);
    ctx.fillText(yRange[1].toFixed(1),m.l-25,m.t+10);
    ctx.fillText(yRange[0].toFixed(1),m.l-28,m.t+ph);
    // Curve
    ctx.strokeStyle=color; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<N;i++){
        const v=data[yMid*N+i], x=m.l+(i/N)*pw;
        const ny=(v-yRange[0])/(yRange[1]-yRange[0]);
        const y=m.t+ph-ny*ph;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
}

function drawCTF(nm) {
    const c=ctfCtx.canvas,w=c.width,h=c.height,dA=nm*10;
    ctfCtx.clearRect(0,0,w,h);
    const m={l:35,r:8,t:6,b:14},pw=w-m.l-m.r,ph=h-m.t-m.b;
    ctfCtx.strokeStyle='rgba(255,255,255,0.06)'; ctfCtx.lineWidth=0.5;
    ctfCtx.beginPath(); ctfCtx.moveTo(m.l,m.t+ph/2); ctfCtx.lineTo(m.l+pw,m.t+ph/2); ctfCtx.stroke();
    const sMax=0.35;
    // Fill area
    ctfCtx.beginPath();
    ctfCtx.moveTo(m.l,m.t+ph/2);
    for(let i=0;i<=pw;i++){
        const s=(i/pw)*sMax,s2=s*s,v=ctfValue(s2,dA);
        ctfCtx.lineTo(m.l+i,m.t+ph/2-v*(ph/2)*0.9);
    }
    ctfCtx.lineTo(m.l+pw,m.t+ph/2); ctfCtx.closePath();
    ctfCtx.fillStyle='rgba(129,140,248,0.08)'; ctfCtx.fill();
    // Line
    ctfCtx.strokeStyle='#818cf8'; ctfCtx.lineWidth=1.5;
    ctfCtx.beginPath();
    for(let i=0;i<=pw;i++){
        const s=(i/pw)*sMax,s2=s*s,v=ctfValue(s2,dA);
        const x=m.l+i,y=m.t+ph/2-v*(ph/2)*0.9;
        i===0?ctfCtx.moveTo(x,y):ctfCtx.lineTo(x,y);
    }
    ctfCtx.stroke();
    ctfCtx.fillStyle='#555'; ctfCtx.font='9px Inter, sans-serif';
    ctfCtx.fillText('1',m.l-12,m.t+8); ctfCtx.fillText('-1',m.l-14,m.t+ph);
    ctfCtx.fillText('0',m.l-2,m.t+ph+11); ctfCtx.fillText(sMax.toFixed(2),m.l+pw-16,m.t+ph+11);
}

function updateInfo(nm) {
    const um=nm/1000, el=document.getElementById('info-text');
    if(Math.abs(um)<0.01)
        el.innerHTML='In focus, the image of a cryo-EM object is very weak. Biological specimens are nearly transparent to electrons (weak phase objects), producing almost no amplitude contrast.';
    else if(Math.abs(um-0.088)<0.015)
        el.innerHTML='The <b>Scherzer defocus</b> value, commonly used in materials science, preserves high-resolution information but still yields low contrast. It optimizes the CTF passband before the first zero crossing.';
    else if(um>0&&um<0.3)
        el.innerHTML='At small underfocus, contrast begins to build as the CTF departs from zero. However, the overall signal remains weak for biological specimens.';
    else if(um>=0.3&&um<1.0)
        el.innerHTML='<ul><li>Moderate underfocus provides usable contrast for particle picking and alignment.</li><li>Low-resolution features become clearly visible.</li><li>Some high-resolution information begins to show delocalization.</li></ul>';
    else if(um>=1.0&&um<2.0)
        el.innerHTML='<ul><li>At high defocus, high-resolution information in the image is strongly <b>delocalized</b>.</li><li>Image processing can re-localize the signals, but at most only about half of the theoretical contrast is preserved.</li><li>"Underfocus" means decreasing the strength of the objective lens, effectively focusing above the specimen.</li></ul>';
    else if(um>=2.0)
        el.innerHTML='<ul><li>Extreme underfocus produces very strong Fresnel fringes and delocalization.</li><li>While contrast is high, positional accuracy of features is severely degraded.</li><li>The CTF oscillates rapidly, causing extensive mixing of spatial frequency information.</li></ul>';
    else
        el.innerHTML='Overfocus: the objective lens is too strong, focusing below the specimen. The CTF behavior mirrors underfocus with inverted phase.';
}

function update(nm) {
    computeImage(nm); drawImage(nm);
    let mx=0; for(let i=0;i<N*N;i++) mx=Math.max(mx,objV[i]);
    drawProfile(oPCtx,objV,N/2,'#34d399',[0,mx*1.1]);
    const il=new Float64Array(N*N);
    for(let i=0;i<N*N;i++) il[i]=imgRe[i]*displayGain/150;
    drawProfile(iPCtx,il,N/2,'#60a5fa',[-0.8,0.8]);
    drawCTF(nm); updateInfo(nm);
    // Update active pill
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const presetMap = {0:0, 88:1, 500:2, 1000:3, 2000:4, 3000:5};
    if (presetMap[nm] !== undefined) {
        document.querySelectorAll('.pill')[presetMap[nm]].classList.add('active');
    }
}

let playing=false, animId=null, cur=0;
function onSlider() {
    cur=parseFloat(document.getElementById('defocus-slider').value);
    document.getElementById('slider-label').textContent=(cur/1000).toFixed(3)+' μm';
    update(cur);
}
function setDefocus(nm) {
    cur=nm; document.getElementById('defocus-slider').value=nm;
    document.getElementById('slider-label').textContent=(nm/1000).toFixed(3)+' μm';
    update(nm);
}
function togglePlay() {
    playing=!playing;
    document.getElementById('play-btn').textContent=playing?'⏸':'▶';
    if(playing) animate(); else if(animId){cancelAnimationFrame(animId);animId=null;}
}
function animate() {
    if(!playing) return;
    cur+=3; if(cur>3000) cur=-200;
    document.getElementById('defocus-slider').value=cur;
    document.getElementById('slider-label').textContent=(cur/1000).toFixed(3)+' μm';
    update(cur); animId=requestAnimationFrame(animate);
}

drawObject(); update(0);
</script>
</body>
</html>
